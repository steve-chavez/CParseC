name: CI

on: [push, pull_request]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.0

      - name: Build
        run: nix-shell --run "make"

      - name: Run tests
        run: nix-shell --run "./test/test.sh"

  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Install Nix
        uses: cachix/install-nix-action@v31.5.0

      - name: Build
        run: nix-shell --run "make bench"

      - name: Run bench
        run: nix-shell --run "./bench/bench.sh"

      - name: Show report
        run: |
          echo -e "## Haskell comparison \n" >> "$GITHUB_STEP_SUMMARY"
          cat build/report-c-hs.md >> "$GITHUB_STEP_SUMMARY"

          echo -e "\n\n## Rust comparison \n" >> "$GITHUB_STEP_SUMMARY"
          cat build/report-c-rust.md >> "$GITHUB_STEP_SUMMARY"
